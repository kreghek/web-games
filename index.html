<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мое Портфолио Игр</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; padding: 50px; }
        h1 { color: #00ffcc; }
        .game-list { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .game-card { background: #333; padding: 20px; border-radius: 8px; text-decoration: none; color: #fff; border: 2px solid #444; width: 200px; transition: 0.2s; }
        .game-card:hover { border-color: #00ffcc; transform: translateY(-5px); }
    </style>
</head>
<body>

    <h1>Мои HTML5 Игры</h1>
    <p>Выберите игру, чтобы запустить её прямо в браузере:</p>

    <div class="game-list">
        <!-- Ссылки ведут на папки внутри репозитория -->
        <a href="./taxi_sim/" class="game-card">
            <h3>Taxi Sim</h3>
            <p>Симулятор такси</p>
        </a>
    </div>

</body>
</html>
